<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports Dashboard V3</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; }
.hidden { display: none; }
nav { background:#111; color:#fff; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
nav a { color:#fff; margin-left:15px; text-decoration:none; cursor:pointer; }
nav a:hover { text-decoration:underline; }
.sidebar { width:240px; background:#222; color:#fff; height:100vh; position:fixed; top:0; left:0; padding-top:60px; display:flex; flex-direction:column; }
.sidebar button { background:none; border:none; color:#fff; padding:15px; text-align:left; cursor:pointer; width:100%; font-size:15px; }
.sidebar button:hover { background:#333; }
.content { margin-left:260px; padding:20px; min-height:100vh; }
h2 { margin-top:0; }
input, button, textarea, select { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:1px solid #ccc; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; }
button:hover { background:#0056b3; }
.card { background:#fff; padding:20px; margin-bottom:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.chat-box { max-height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; }
.chat-message { margin-bottom:5px; }
.gallery img { width:150px; margin:5px; border-radius:5px; }
</style>
</head>
<body>

<!-- ===== Admin Login ===== -->
<div id="admin-login-page" class="container" style="max-width:400px; margin:50px auto;">
  <h2>Admin Panel Login</h2>
  <div class="card">
    <input type="text" id="admin-username" placeholder="Username" />
    <input type="password" id="admin-password" placeholder="Password" />
    <button onclick="adminLogin()">Login</button>
  </div>
</div>

<!-- ===== User Login/Signup Page ===== -->
<div id="auth-page" class="container" style="max-width:400px; margin:50px auto;">
  <h2>PF Esports</h2>
  <div class="card">
    <div id="signup-form">
      <h3>Sign Up</h3>
      <input type="text" id="signup-name" placeholder="Name" />
      <input type="text" id="signup-username" placeholder="Username" />
      <input type="text" id="signup-team" placeholder="Team Name (Optional)" />
      <input type="text" id="signup-ign" placeholder="In-game Name" />
      <input type="password" id="signup-password" placeholder="Password" />
      <button onclick="signup()">Sign Up</button>
      <p>Already have an account? <a href="#" onclick="toggleAuth('login')">Login</a></p>
    </div>

    <div id="login-form" class="hidden">
      <h3>Login</h3>
      <input type="text" id="login-username" placeholder="Username" />
      <input type="password" id="login-password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p>Don't have an account? <a href="#" onclick="toggleAuth('signup')">Sign Up</a></p>
    </div>
  </div>
</div>

<!-- ===== Admin Dashboard ===== -->
<div id="admin-dashboard" class="hidden">
  <nav>
    <div>PF Esports - Admin</div>
    <div><a onclick="logoutAdmin()">Logout</a></div>
  </nav>
  <div class="sidebar">
    <button onclick="showAdminPage('manage-tournaments')">Manage Tournaments</button>
    <button onclick="showAdminPage('update-scores')">Update Team Scores</button>
    <button onclick="showAdminPage('manage-users')">Manage Users</button>
  </div>
  <div class="content">
    <div id="manage-tournaments" class="hidden">
      <h2>Manage Tournaments</h2>
      <div class="card">
        <input type="text" id="new-tournament-name" placeholder="Tournament Name" />
        <button onclick="addTournament()">Add Tournament</button>
      </div>
      <div id="tournament-list" class="card"></div>
    </div>

    <div id="update-scores" class="hidden">
      <h2>Update Team Scores</h2>
      <div class="card">
        <input type="text" id="team-name-update" placeholder="Team Name" />
        <input type="number" id="team-score-update" placeholder="New Score" />
        <button onclick="updateTeamScore()">Update Score</button>
      </div>
    </div>

    <div id="manage-users" class="hidden">
      <h2>Registered Users</h2>
      <div id="user-list" class="card"></div>
    </div>
  </div>
</div>

<!-- ===== User Dashboard ===== -->
<div id="dashboard" class="hidden">
  <nav>
    <div>PF Esports</div>
    <div><a onclick="logout()">Logout</a></div>
  </nav>
  <div class="sidebar">
    <button onclick="showPage('profile')">Profile</button>
    <button onclick="showPage('player-stats')">Player Stats</button>
    <button onclick="showPage('teams')">Teams</button>
    <button onclick="showPage('create-team')">Create Team</button>
    <button onclick="showPage('tournaments')">Tournaments</button>
    <button onclick="showPage('scoreboard')">Scoreboard</button>
    <button onclick="showPage('leaderboard')">Leaderboard</button>
    <button onclick="showPage('chat')">Chat</button>
    <button onclick="showPage('gallery')">Gallery</button>
    <button onclick="showPage('notifications')">Notifications</button>
  </div>
  <div class="content">
    <!-- Sections like profile, create team, scoreboard, leaderboard, etc. similar to previous version -->
  </div>
</div>

<script>
// Admin credentials
const adminCredentials = { username: 'talha439', password: 'dalha439' };

// Sample data
let users = [];
let tournaments = [];
let teams = [];

let currentUser = null;
let currentAdmin = null;

// ===== Admin Login =====
function adminLogin(){
  const username = document.getElementById('admin-username').value;
  const password = document.getElementById('admin-password').value;
  if(username === adminCredentials.username && password === adminCredentials.password){
    currentAdmin = true;
    document.getElementById('admin-login-page').classList.add('hidden');
    document.getElementById('admin-dashboard').classList.remove('hidden');
  } else { alert('Invalid Admin Credentials'); }
}
function logoutAdmin(){
  currentAdmin = null;
  document.getElementById('admin-dashboard').classList.add('hidden');
  document.getElementById('admin-login-page').classList.remove('hidden');
}
function showAdminPage(page){
  ['manage-tournaments','update-scores','manage-users'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');
}
function addTournament(){
  const name = document.getElementById('new-tournament-name').value;
  if(name){
    tournaments.push({name});
    const div = document.createElement('div');
    div.innerText = name;
    document.getElementById('tournament-list').appendChild(div);
    alert('Tournament Added!');
  }
}
function updateTeamScore(){
  const team = document.getElementById('team-name-update').value;
  const score = parseInt(document.getElementById('team-score-update').value);
  if(team && !isNaN(score)){
    const existing = teams.find(t=>t.name===team);
    if(existing){ existing.score = score; alert('Score Updated'); }
    else { teams.push({name:team,score}); alert('Team Added with Score'); }
  }
}
</script>
</body>
</html>
