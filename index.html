<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.hidden { display:none; }
nav { background:#111; color:#fff; padding:10px 20px; display:flex; justify-content:space-between; }
.sidebar { width:220px; background:#222; color:#fff; height:100vh; position:fixed; top:0; left:0; padding-top:60px; }
.sidebar button { width:100%; padding:12px; background:none; border:none; color:#fff; text-align:left; }
.sidebar button:hover { background:#333; }
.content { margin-left:240px; padding:20px; }
.card { background:#fff; padding:20px; margin-bottom:20px; border-radius:8px; }
input,button { padding:10px; margin:5px 0; width:100%; }
button { background:#007bff; color:#fff; border:none; }
</style>

</head>
<body>

<!-- AUTH -->
<div id="auth-page" style="max-width:400px;margin:50px auto;">
<div class="card">

<div id="signup-form">
<h3>Sign Up</h3>
<input id="signup-name" placeholder="Name">
<input id="signup-username" placeholder="Username">
<input id="signup-ign" placeholder="IGN">
<input id="signup-password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<p><a href="#" onclick="toggleAuth('login')">Login</a></p>
<p><a href="#" onclick="toggleAuth('admin')">Admin Login</a></p>
</div>

<div id="login-form" class="hidden">
<h3>Login</h3>
<input id="login-username" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a href="#" onclick="toggleAuth('signup')">Sign Up</a></p>
<p><a href="#" onclick="toggleAuth('admin')">Admin Login</a></p>
</div>

<div id="admin-login-form" class="hidden">
<h3>Admin Login</h3>
<input id="admin-username" placeholder="Admin Username">
<input id="admin-password" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>
<p><a href="#" onclick="toggleAuth('login')">Back</a></p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<nav>
<div>PF Esports</div>
<button onclick="logout()">Logout</button>
</nav>

<div class="sidebar">
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('teams')">Teams</button>
<button onclick="showPage('create')">Create Team</button>
<button onclick="showPage('tournaments')">Tournaments</button>
<button onclick="showPage('scoreboard')">Scoreboard</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('admin-panel')">Admin Panel</button>
</div>

<div class="content">

<div id="profile" class="hidden card">
<h2>Profile</h2>
<p id="pname"></p>
</div>

<div id="teams" class="hidden card">
<h2>Teams</h2>
<div id="team-list"></div>
</div>

<div id="create" class="hidden card">
<h2>Create Team</h2>
<input id="tname" placeholder="Team Name">
<input id="p1" placeholder="Player1">
<input id="p2" placeholder="Player2">
<input id="p3" placeholder="Player3">
<input id="p4" placeholder="Player4">
<input id="p5" placeholder="Player5 (Optional)">
<input id="p6" placeholder="Player6 (Optional)">
<button onclick="createTeam()">Create</button>
</div>

<div id="tournaments" class="hidden card">
<h2>Tournaments</h2>
<div id="tour-list">Coming Soon</div>
</div>

<div id="scoreboard" class="hidden card">
<h2>Scoreboard</h2>
<div id="score-list"></div>
</div>

<div id="chat" class="hidden card">
<h2>Chat</h2>
<div id="chat-box"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="hidden card">
<h2>Admin Panel</h2>

<h3>Add Tournament</h3>
<input id="admin-tour">
<button onclick="addTour()">Add</button>

<h3>Update Score</h3>
<input id="admin-team">
<input id="admin-score">
<button onclick="addScore()">Update</button>

</div>

</div>
</div>

<script>
let users=[];
let currentUser=null;
let isAdmin=false;

function toggleAuth(type){
document.getElementById('signup-form').classList.add('hidden');
document.getElementById('login-form').classList.add('hidden');
document.getElementById('admin-login-form').classList.add('hidden');

if(type==='signup') document.getElementById('signup-form').classList.remove('hidden');
if(type==='login') document.getElementById('login-form').classList.remove('hidden');
if(type==='admin') document.getElementById('admin-login-form').classList.remove('hidden');
}

function signup(){
let u=document.getElementById('signup-username').value;
let p=document.getElementById('signup-password').value;
if(u && p){
users.push({u,p});
alert('Signup done');
toggleAuth('login');
}
}

function login(){
let u=document.getElementById('login-username').value;
let p=document.getElementById('login-password').value;

let found=users.find(x=>x.u===u && x.p===p);

if(found){
currentUser=found;
isAdmin=false;
document.getElementById('auth-page').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
showPage('profile');
document.getElementById('pname').innerText=u;
}else{
alert('Wrong login');
}
}

function adminLogin(){
let u=document.getElementById('admin-username').value;
let p=document.getElementById('admin-password').value;

if(u==='talha439' && p==='dalha439'){
isAdmin=true;
document.getElementById('auth-page').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
showPage('admin-panel');
}else{
alert('Wrong admin');
}
}

function logout(){
location.reload();
}

function showPage(id){
['profile','teams','create','tournaments','scoreboard','chat','admin-panel']
.forEach(x=>document.getElementById(x).classList.add('hidden'));

document.getElementById(id).classList.remove('hidden');
}

function createTeam(){
let name=document.getElementById('tname').value;
let players=[p1.value,p2.value,p3.value,p4.value,p5.value,p6.value].filter(x=>x);

if(name && players.length>=4){
let div=document.createElement('div');
div.innerText=name + ' - ' + players.join(',');
document.getElementById('team-list').appendChild(div);
}
}

function send(){
let m=document.getElementById('msg').value;
let d=document.createElement('div');
d.innerText=m;
document.getElementById('chat-box').appendChild(d);
}

function addTour(){
let t=document.getElementById('admin-tour').value;
let d=document.createElement('div');
d.innerText=t;
document.getElementById('tour-list').appendChild(d);
}

function addScore(){
let t=document.getElementById('admin-team').value;
let s=document.getElementById('admin-score').value;
let d=document.createElement('div');
d.innerText=t + ' : ' + s;
document.getElementById('score-list').appendChild(d);
}
</script>

</body>
</html>
