<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PFS Esports Federation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; margin:0; background:#0f0f1a; color:white;}
nav {background:#111; padding:10px; text-align:center;}
nav button {margin:5px; padding:10px; background:#222; color:white; border:none; cursor:pointer;}
section {display:none; padding:20px;}
.active {display:block;}
input, button {padding:10px; margin:5px; width:90%;}
.card {background:#1c1c2b; padding:15px; margin:10px 0; border-radius:10px;}
</style>
</head>

<body>

<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- LOGIN -->
<section id="login" class="active">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</section>

<!-- SIGNUP -->
<section id="signup">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>Team Registration</h2>
<input id="teamName" placeholder="Team Name">
<input id="playerName" placeholder="Leader Name">
<button onclick="saveTeam()">Register Team</button>

<div id="teams"></div>
</section>

<!-- ADMIN PANEL -->
<section id="admin">
<h2>Admin Panel (All Teams)</h2>
<div id="adminTeams"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAowtYIS_HuN6MOYDC7cv_Rtb_jylm1A1Y",
  authDomain: "pef-esports-federation.firebaseapp.com",
  projectId: "pef-esports-federation",
  storageBucket: "pef-esports-federation.firebasestorage.app",
  messagingSenderId: "990873596300",
  appId: "1:990873596300:web:97b6cea53b651e44d3e6a9",
  measurementId: "G-7FMN84766W"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* PAGE SWITCH */
window.show = function(page){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
if(page=="admin") loadAdmin();
if(page=="dashboard") loadTeams();
}

/* SIGNUP */
window.signup = function(){
let email = signupEmail.value;
let pass = signupPass.value;

createUserWithEmailAndPassword(auth, email, pass)
.then(()=>alert("Account Created"))
.catch(e=>alert(e.message));
}

/* LOGIN */
window.login = function(){
let email = loginEmail.value;
let pass = loginPass.value;

signInWithEmailAndPassword(auth, email, pass)
.then(()=>alert("Login Success"))
.catch(e=>alert(e.message));
}

/* SAVE TEAM */
window.saveTeam = async function(){
await addDoc(collection(db,"teams"),{
team: teamName.value,
leader: playerName.value
});
alert("Team Registered!");
loadTeams();
}

/* LOAD USER TEAMS */
window.loadTeams = async function(){
let q = await getDocs(collection(db,"teams"));
let html = "";
q.forEach(doc=>{
html += `<div class="card">
<b>${doc.data().team}</b><br>
Leader: ${doc.data().leader}
</div>`;
});
teams.innerHTML = html;
}

/* ADMIN LOAD */
window.loadAdmin = async function(){
let q = await getDocs(collection(db,"teams"));
let html = "";
q.forEach(doc=>{
html += `<div class="card">
🏆 ${doc.data().team}<br>
👤 ${doc.data().leader}
</div>`;
});
adminTeams.innerHTML = html;
}

</script>

</body>
</html>
