<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PFS Esports Pro v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f0f1a;color:white;}
nav{background:#111;padding:10px;text-align:center;}
nav button{margin:5px;padding:10px;background:#222;color:white;border:none;cursor:pointer;}
section{display:none;padding:20px;}
.card{background:#1c1c2b;padding:15px;margin:10px 0;border-radius:10px;}
input,button{padding:10px;margin:5px;width:90%;}
.hidden{display:none;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>
<button onclick="show('dashboard')" id="dashBtn" class="hidden">Dashboard</button>
<button onclick="show('admin')" id="adminBtn" class="hidden">Admin</button>
</nav>

<!-- LOGIN -->
<section id="login" style="display:block;">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</section>

<!-- SIGNUP -->
<section id="signup">
<h2>Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password">
<button onclick="signup()">Create Account</button>
<p class="small">Admin Email: admin@pfs.com</p>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>🎮 Teams Dashboard</h2>

<div class="card">
<h3>🏆 Register Team</h3>
<input id="teamName" placeholder="Team Name">
<input id="leaderName" placeholder="Leader Name">
<button onclick="addTeam()">Add Team</button>
</div>

<div id="teams"></div>

</section>

<!-- ADMIN -->
<section id="admin">
<h2>👑 Admin Control Panel</h2>

<div class="card">
<h3>📊 All Registered Teams</h3>
<div id="adminTeams"></div>
</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAowtYIS_HuN6MOYDC7cv_Rtb_jylm1A1Y",
  authDomain: "pef-esports-federation.firebaseapp.com",
  projectId: "pef-esports-federation",
  storageBucket: "pef-esports-federation.firebasestorage.app",
  messagingSenderId: "990873596300",
  appId: "1:990873596300:web:97b6cea53b651e44d3e6a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAdmin = false;

/* ADMIN EMAIL */
const ADMIN_EMAIL = "admin@pfs.com";

/* NAV CONTROL */
window.show = function(page){

if(!isAdmin && page=="admin"){
alert("Admin only area!");
return;
}

if(page=="dashboard" && !auth.currentUser){
alert("Login required!");
return;
}

document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(page).style.display="block";

if(page=="dashboard") loadTeams();
if(page=="admin") loadAdmin();
}

/* SIGNUP */
window.signup = function(){
createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value)
.then(()=>alert("Account Created"))
.catch(e=>alert(e.message));
}

/* LOGIN */
window.login = function(){
signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value)
.then((user)=>{
alert("Login Success");

if(user.user.email === ADMIN_EMAIL){
isAdmin = true;
adminBtn.classList.remove("hidden");
}

dashBtn.classList.remove("hidden");
show("dashboard");
})
.catch(e=>alert(e.message));
}

/* ADD TEAM */
window.addTeam = async function(){
await addDoc(collection(db,"teams"),{
name: teamName.value,
leader: leaderName.value,
time: new Date().toLocaleString()
});
loadTeams();
}

/* LOAD TEAMS */
window.loadTeams = async function(){
let data = await getDocs(collection(db,"teams"));
let html="";

data.forEach(d=>{
html+=`
<div class="card">
🏆 ${d.data().name}<br>
👤 ${d.data().leader}<br>
🕒 ${d.data().time}
</div>`;
});

teams.innerHTML=html;
}

/* ADMIN LOAD (WITH DELETE + EDIT) */
window.loadAdmin = async function(){
let data = await getDocs(collection(db,"teams"));
let html="";

data.forEach(d=>{
html+=`
<div class="card">
🏆 ${d.data().name}<br>
👤 ${d.data().leader}<br>
<button onclick="deleteTeam('${d.id}')">Delete</button>
<button onclick="editTeam('${d.id}')">Edit</button>
</div>`;
});

adminTeams.innerHTML=html;
}

/* DELETE */
window.deleteTeam = async function(id){
await deleteDoc(doc(db,"teams",id));
loadAdmin();
loadTeams();
}

/* EDIT */
window.editTeam = async function(id){
let newName = prompt("New Team Name:");
let newLeader = prompt("New Leader Name:");

await updateDoc(doc(db,"teams",id),{
name:newName,
leader:newLeader
});

loadAdmin();
loadTeams();
}

</script>

</body>
</html>
