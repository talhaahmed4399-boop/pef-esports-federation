<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports Ultimate Pro</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.hidden{display:none}
nav{background:#020617;padding:15px;display:flex;justify-content:space-between}
.sidebar{width:240px;background:#020617;height:100vh;position:fixed;top:0;left:0;padding-top:60px}
.sidebar button{width:100%;padding:12px;background:none;border:none;color:#fff;text-align:left}
.sidebar button:hover{background:#1e293b}
.content{margin-left:250px;padding:20px}
.card{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
input,button{padding:10px;margin:5px 0;width:100%}
button{background:#2563eb;color:#fff;border:none}
.logo{font-size:22px;font-weight:bold;color:#22c55e}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-page" style="max-width:400px;margin:50px auto;">
<div class="card">
<h2 class="logo">PF ESPORTS</h2>

<div id="signup-form">
<input id="su-user" placeholder="Username">
<input id="su-pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<p onclick="toggle('login')">Login</p>
<p onclick="toggle('admin')">Admin Login</p>
</div>

<div id="login-form" class="hidden">
<input id="li-user" placeholder="Username">
<input id="li-pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="toggle('signup')">Signup</p>
<p onclick="toggle('admin')">Admin Login</p>
</div>

<div id="admin-form" class="hidden">
<input id="ad-user" placeholder="Admin Username">
<input id="ad-pass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

</div>
</div>

<!-- USER DASHBOARD -->
<div id="dash" class="hidden">
<nav><div class="logo">PF ESPORTS</div><button onclick="logout()">Logout</button></nav>
<div class="sidebar">
<button onclick="show('profile')">Profile</button>
<button onclick="show('teams')">Teams</button>
<button onclick="show('create')">Create Team</button>
<button onclick="show('scoreboard')">Scoreboard</button>
<button onclick="show('leaderboard')">Leaderboard</button>
<button onclick="show('pubg')">PUBG Tournament</button>
</div>
<div class="content">

<div id="profile" class="card hidden"><h3>User Profile</h3><p id="uname"></p></div>

<div id="teams" class="card hidden"><h3>Teams</h3><div id="teamList"></div></div>

<div id="create" class="card hidden">
<h3>Create Team</h3>
<input id="tname" placeholder="Team Name">
<input id="tag" placeholder="Team Tag">
<input id="p1" placeholder="Player1">
<input id="p2" placeholder="Player2">
<input id="p3" placeholder="Player3">
<input id="p4" placeholder="Player4">
<input id="p5" placeholder="Player5 optional">
<input id="p6" placeholder="Player6 optional">
<button onclick="createTeam()">Create Team</button>
</div>

<div id="scoreboard" class="card hidden"><h3>Scoreboard</h3><div id="scores"></div></div>
<div id="leaderboard" class="card hidden"><h3>Leaderboard</h3><div id="leader"></div></div>

<div id="pubg" class="card hidden">
<h3>PUBG Tournament</h3>
<p>Map: Erangel</p>
<p>Mode: Squad</p>
<p id="regStatus">Status: Closed</p>
</div>

</div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDash" class="hidden">
<nav><div class="logo">ADMIN PANEL</div><button onclick="logout()">Logout</button></nav>
<div class="content">

<div class="card">
<h3>All Teams</h3>
<div id="adminTeams"></div>
</div>

<div class="card">
<h3>Update Score</h3>
<input id="ateam" placeholder="Team Name">
<input id="ascore" placeholder="Score">
<button onclick="updateScore()">Update Score</button>
</div>

<div class="card">
<h3>Tournament Control</h3>
<button onclick="openReg()">Open Registration</button>
<button onclick="closeReg()">Close Registration</button>
</div>

</div>
</div>

<script>
let users=[];let teams=[];let scores=[];

function toggle(x){document.getElementById('signup-form').classList.add('hidden');document.getElementById('login-form').classList.add('hidden');document.getElementById('admin-form').classList.add('hidden');document.getElementById(x+'-form')?.classList.remove('hidden')}

function signup(){users.push({u:su-user.value,p:su-pass.value});alert('Signup Done')}

function login(){let u=li-user.value,p=li-pass.value;let f=users.find(x=>x.u==u&&x.p==p);if(f){dash.classList.remove('hidden');auth-page.classList.add('hidden');uname.innerText=u}else alert('Wrong Login')}

function adminLogin(){if(ad-user.value==='talha439'&&ad-pass.value==='dalha439'){adminDash.classList.remove('hidden');auth-page.classList.add('hidden')}else alert('Wrong Admin')}

function logout(){location.reload()}

function show(x){['profile','teams','create','scoreboard','leaderboard','pubg'].forEach(i=>document.getElementById(i).classList.add('hidden'));document.getElementById(x).classList.remove('hidden')}

function createTeam(){
let name=tname.value;let players=[p1.value,p2.value,p3.value,p4.value,p5.value,p6.value].filter(x=>x);
if(name&&players.length>=4){teams.push({name,players});
let d=document.createElement('div');d.innerText=name;
teamList.appendChild(d);
adminTeams.appendChild(d.cloneNode(true));}}

function updateScore(){
let t=ateam.value,s=ascore.value;
let d=document.createElement('div');d.innerText=t+' : '+s;
scores.push({t,s});
scores.sort((a,b)=>b.s-a.s);

scoresDiv.innerHTML='';leader.innerHTML='';

scores.forEach(x=>{
let el=document.createElement('div');el.innerText=x.t+' : '+x.s;
scores.appendChild(el);
leader.appendChild(el.cloneNode(true));});}

function openReg(){document.getElementById('regStatus').innerText='Status: Open'}
function closeReg(){document.getElementById('regStatus').innerText='Status: Closed'}
</script>

</body>
</html>
