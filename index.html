<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports PRO</title>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:0}
.card{background:#1e293b;padding:20px;border-radius:10px;margin:10px}
input,button{padding:10px;margin:5px;width:100%;border-radius:5px;border:none}
button{background:#3b82f6;color:white;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h2>PF Esports PRO</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <h3>Profile</h3>
    <p id="userEmail"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Create Team</h3>
    <input id="teamName" placeholder="Team Name">
    <button onclick="createTeam()">Create</button>
  </div>

  <div class="card">
    <h3>Teams</h3>
    <div id="teams"></div>
  </div>

  <div class="card">
    <h3>Scoreboard</h3>
    <div id="score"></div>
  </div>

</div>

<script>

// 🔥 FIREBASE CONFIG (YOUR ORIGINAL)
const firebaseConfig = {
  apiKey: "AIzaSyAowtYIS_HuN6MOYDC7cv_Rtb_jylm1A1Y",
  authDomain: "pef-esports-federation.firebaseapp.com",
  projectId: "pef-esports-federation",
  storageBucket: "pef-esports-federation.appspot.com",
  messagingSenderId: "990873596300",
  appId: "1:990873596300:web:97b6cea53b651e44d3e6a9",
  measurementId: "G-7FMN84766W"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


// 🔥 SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value, password.value)
.then(()=>alert("Signup Success"))
.catch(err=>alert(err.message));
}

// 🔥 LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value, password.value)
.catch(err=>alert(err.message));
}

// 🔥 LOGOUT
function logout(){
auth.signOut();
}

// 🔥 AUTH STATE
auth.onAuthStateChanged(user=>{
if(user){
authUI(true,user);
loadTeams();
}else{
authUI(false);
}
});

function authUI(state,user){
document.getElementById("auth").classList.toggle("hidden",state);
document.getElementById("dashboard").classList.toggle("hidden",!state);
if(user){
document.getElementById("userEmail").innerText=user.email;
}
}

// 🔥 CREATE TEAM
function createTeam(){
if(!auth.currentUser){
alert("Login first!");
return;
}

db.collection("teams").add({
name: teamName.value,
score: 0,
createdBy: auth.currentUser.email
}).then(()=>alert("Team Created"));
}

// 🔥 LOAD TEAMS
function loadTeams(){
db.collection("teams").onSnapshot(snap=>{
teams.innerHTML="";
score.innerHTML="";

let arr=[];

snap.forEach(doc=>{
let t = doc.data();
arr.push(t);

teams.innerHTML += <p>${t.name} - ${t.score}</p>;
});

// scoreboard sorting
arr.sort((a,b)=>b.score-a.score);

arr.forEach((t,i)=>{
score.innerHTML += <p>${i+1}. ${t.name} - ${t.score}</p>;
});

});
}

</script>

</body>
</html>
