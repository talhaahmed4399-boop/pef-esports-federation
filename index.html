<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEF Esports Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin:0;
        padding:0;
        background-color:#121212;
        color:#fff;
    }
    header {
        background:#1f1f1f;
        padding:15px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
    }
    nav {
        display:flex;
        justify-content:center;
        background:#222;
    }
    nav button {
        margin:5px;
        padding:10px 20px;
        background:#333;
        border:none;
        color:#fff;
        cursor:pointer;
    }
    nav button.active {
        background:#ff6600;
    }
    section {
        display:none;
        padding:20px;
    }
    section.active {
        display:block;
    }
    input, select {
        padding:8px;
        margin:5px 0;
        width:100%;
        max-width:400px;
        background:#222;
        border:1px solid #444;
        color:#fff;
    }
    button.submit-btn {
        background:#ff6600;
        border:none;
        color:#fff;
        padding:10px 20px;
        cursor:pointer;
        margin-top:10px;
    }
    table {
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
        color:#fff;
    }
    table, th, td {
        border:1px solid #444;
    }
    th, td {
        padding:10px;
        text-align:left;
    }
</style>
</head>
<body>

<header>PEF Esports Dashboard</header>

<nav>
    <button onclick="showSection('login')" class="active">Login</button>
    <button onclick="showSection('signup')">Sign Up</button>
    <button onclick="showSection('playerReg')">Player Registration</button>
    <button onclick="showSection('createTeam')">Create Team</button>
    <button onclick="showSection('adminPanel')">Admin Panel</button>
</nav>
