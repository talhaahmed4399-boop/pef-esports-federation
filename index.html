<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.hidden { display:none; }

nav { background:#111; color:#fff; padding:10px; display:flex; justify-content:space-between; }

.sidebar {
  width:220px; background:#222; color:#fff;
  height:100vh; position:fixed; padding-top:60px;
}
.sidebar button {
  background:none; border:none; color:#fff;
  padding:15px; width:100%; text-align:left;
}
.sidebar button:hover { background:#333; }

.content { margin-left:240px; padding:20px; }

.card {
  background:#fff; padding:20px;
  border-radius:8px; margin-bottom:20px;
}

input, button {
  padding:10px; margin:5px 0; width:100%;
}

button { background:#007bff; color:#fff; border:none; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-page" style="max-width:400px;margin:50px auto;">
<h2>PF Esports</h2>

<div class="card">
<div id="signup-form">
<h3>Sign Up</h3>
<input id="signup-name" placeholder="Name">
<input id="signup-username" placeholder="Username">
<input id="signup-team" placeholder="Team">
<input id="signup-ign" placeholder="IGN">
<input id="signup-password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<p><a onclick="toggleAuth('login')">Login</a> | 
<a onclick="toggleAuth('admin')">Admin</a></p>
</div>

<div id="login-form" class="hidden">
<h3>Login</h3>
<input id="login-username">
<input id="login-password" type="password">
<button onclick="login()">Login</button>
</div>

<div id="admin-login-form" class="hidden">
<h3>Admin Login</h3>
<input id="admin-username">
<input id="admin-password" type="password">
<button onclick="adminLogin()">Login</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<nav>
<div>PF Esports</div>
<button onclick="logout()">Logout</button>
</nav>

<div class="sidebar">
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('teams')">Teams</button>
<button onclick="showPage('create-team')">Create Team</button>
<button onclick="showPage('scoreboard')">Scoreboard</button>
<button onclick="showPage('admin-panel')">Admin Panel</button>
</div>

<div class="content">

<div id="profile" class="hidden">
<div class="card">
<p>Name: <span id="pname"></span></p>
<p>User: <span id="puser"></span></p>
</div>
</div>

<div id="teams" class="hidden">
<div class="card" id="team-list"></div>
</div>

<div id="create-team" class="hidden">
<div class="card">
<input id="tname" placeholder="Team Name">
<input id="p1" placeholder="Player1">
<input id="p2">
<input id="p3">
<input id="p4">
<button onclick="createTeam()">Create</button>
</div>
</div>

<div id="scoreboard" class="hidden">
<div class="card" id="scores"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="hidden">
<div class="card">
<h3>Registration</h3>
<p>Status: <span id="reg-status"></span></p>
<button onclick="toggleReg()">Toggle</button>
</div>

<div class="card">
<h3>Update Score</h3>
<input id="score-team" placeholder="Team">
<input id="score-value" type="number">
<button onclick="updateScore()">Update</button>
</div>
</div>

</div>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let teams = JSON.parse(localStorage.getItem("teams")) || [];
let regOpen = JSON.parse(localStorage.getItem("regOpen")) ?? true;

let currentUser = null;
let isAdmin = false;

function save(){
localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("teams", JSON.stringify(teams));
localStorage.setItem("regOpen", JSON.stringify(regOpen));
}

function toggleAuth(x){
signup-form.classList.add("hidden");
login-form.classList.add("hidden");
admin-login-form.classList.add("hidden");

if(x=="login") login-form.classList.remove("hidden");
if(x=="admin") admin-login-form.classList.remove("hidden");
}

function signup(){
if(!regOpen){ alert("Registration Closed"); return; }

let u = {
name: signup-name.value,
username: signup-username.value,
team: signup-team.value,
ign: signup-ign.value,
password: signup-password.value
};

users.push(u);
save();
alert("Done");
}

function login(){
let u = users.find(x=>x.username==login-username.value && x.password==login-password.value);

if(u){
currentUser = u;
dashboard.classList.remove("hidden");
auth-page.classList.add("hidden");
showPage("profile");

pname.innerText=u.name;
puser.innerText=u.username;
}
}

function adminLogin(){
if(admin-username.value=="TALHA439" && admin-password.value=="TALHA439"){
isAdmin=true;
dashboard.classList.remove("hidden");
auth-page.classList.add("hidden");
document.querySelector(".sidebar").style.display="none";
showPage("admin-panel");
}
}

function logout(){ location.reload(); }

function showPage(p){
["profile","teams","create-team","scoreboard","admin-panel"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(p).classList.remove("hidden");

renderTeams();
renderScores();
}

function createTeam(){
let t = {
name: tname.value,
players: [p1.value,p2.value,p3.value,p4.value],
score:0
};
teams.push(t);
save();
alert("Team Added");
}

function renderTeams(){
team-list.innerHTML="";
teams.forEach(t=>{
let d=document.createElement("div");
d.innerText=t.name+" ("+t.players.join(",")+") Score:"+t.score;
team-list.appendChild(d);
});
}

function updateScore(){
let t = teams.find(x=>x.name==score-team.value);
if(t){
t.score=parseInt(score-value.value);
save();
alert("Updated");
}
}

function renderScores(){
scores.innerHTML="";
[...teams].sort((a,b)=>b.score-a.score).forEach((t,i)=>{
let d=document.createElement("div");
d.innerText=(i+1)+". "+t.name+" - "+t.score;
scores.appendChild(d);
});
}

function toggleReg(){
regOpen=!regOpen;
save();
updateReg();
}

function updateReg(){
reg-status.innerText = regOpen ? "OPEN" : "CLOSED";
}

window.onload=updateReg;

</script>

</body>
</html>
