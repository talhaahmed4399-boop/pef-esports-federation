<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Esports Dashboard</title>
<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.hidden { display:none; }
nav { background:#111; color:#fff; padding:10px; display:flex; justify-content:space-between; }
.sidebar { width:220px; background:#222; color:#fff; height:100vh; position:fixed; padding-top:60px; }
.sidebar button { background:none; border:none; color:#fff; padding:15px; width:100%; text-align:left; }
.sidebar button:hover { background:#333; }
.content { margin-left:240px; padding:20px; }
.card { background:#fff; padding:20px; border-radius:8px; margin-bottom:20px; }
input, button { padding:10px; margin:5px 0; width:100%; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; }
button:hover { background:#0056b3; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-page" style="max-width:400px;margin:50px auto;">
<h2>PF Esports</h2>
<div class="card">
<!-- Signup -->
<div id="signup-form">
<h3>Sign Up</h3>
<input id="signup-name" placeholder="Name">
<input id="signup-username" placeholder="Username">
<input id="signup-team" placeholder="Team (Optional)">
<input id="signup-ign" placeholder="In-game Name">
<input id="signup-password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<p>Already have account? <a onclick="toggleAuth('login')">Login</a> | <a onclick="toggleAuth('admin')">Admin</a></p>
</div>

<!-- User Login -->
<div id="login-form" class="hidden">
<h3>Login</h3>
<input id="login-username" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>Don't have account? <a onclick="toggleAuth('signup')">Sign Up</a></p>
</div>

<!-- Admin Login -->
<div id="admin-login-form" class="hidden">
<h3>Admin Login</h3>
<input id="admin-username" placeholder="Admin Username">
<input id="admin-password" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<nav>
<div>PF Esports</div>
<button onclick="logout()">Logout</button>
</nav>

<div class="sidebar">
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('teams')">Teams</button>
<button onclick="showPage('create-team')">Create Team</button>
<button onclick="showPage('scoreboard')">Scoreboard</button>
<button onclick="showPage('admin-panel')">Admin Panel</button>
</div>

<div class="content">
<!-- Profile -->
<div id="profile" class="hidden">
<div class="card">
<p>Name: <span id="profile-name"></span></p>
<p>Username: <span id="profile-username"></span></p>
<p>Team: <span id="profile-team"></span></p>
<p>In-game Name: <span id="profile-ign"></span></p>
</div>
</div>

<!-- Teams -->
<div id="teams" class="hidden">
<div class="card" id="team-list"></div>
</div>

<!-- Create Team -->
<div id="create-team" class="hidden">
<div class="card">
<input id="team-name" placeholder="Team Name">
<input id="player1" placeholder="Player 1">
<input id="player2" placeholder="Player 2">
<input id="player3" placeholder="Player 3">
<input id="player4" placeholder="Player 4">
<input id="player5" placeholder="Player 5 (Optional)">
<input id="player6" placeholder="Player 6 (Optional)">
<button onclick="createTeam()">Create Team</button>
</div>
</div>

<!-- Scoreboard -->
<div id="scoreboard" class="hidden">
<div class="card" id="score-list"></div>
</div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden">
<div class="card">
<h3>Registration Control</h3>
<p>Status: <span id="reg-status"></span></p>
<button onclick="toggleRegistration()">Toggle Open/Close</button>
</div>

<div class="card">
<h3>Update Team Score</h3>
<input id="admin-team-name" placeholder="Team Name">
<input id="admin-team-score" type="number" placeholder="Score">
<button onclick="updateTeamScore()">Update</button>
</div>
</div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let teams = JSON.parse(localStorage.getItem("teams")) || [];
let registrationOpen = JSON.parse(localStorage.getItem("regOpen")) ?? true;
let currentUser = null;
let isAdmin = false;

function saveAll(){
localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("teams", JSON.stringify(teams));
localStorage.setItem("regOpen", JSON.stringify(registrationOpen));
}

function toggleAuth(form){
signup-form.classList.add('hidden');
login-form.classList.add('hidden');
admin-login-form.classList.add('hidden');
if(form==='signup') signup-form.classList.remove('hidden');
if(form==='login') login-form.classList.remove('hidden');
if(form==='admin') admin-login-form.classList.remove('hidden');
}

function signup(){
if(!registrationOpen){ alert("Registration Closed"); return; }
const name = signup-name.value;
const username = signup-username.value;
const team = signup-team.value;
const ign = signup-ign.value;
const password = signup-password.value;
if(!name || !username || !ign || !password){ alert("Fill required fields"); return; }
if(users.find(u=>u.username===username)){ alert("Username exists"); return; }
users.push({name, username, team, ign, password});
saveAll();
alert("Sign Up Successful"); toggleAuth('login');
}

function login(){
const username = login-username.value;
const password = login-password.value;
const user = users.find(u=>u.username===username && u.password===password);
if(user){ 
currentUser = user; isAdmin=false;
auth-page.classList.add('hidden'); dashboard.classList.remove('hidden');
showPage('profile'); updateProfile();
}else{ alert("Invalid credentials"); }
}

function adminLogin(){
const username = admin-username.value;
const password = admin-password.value;
if(username==="TALHA439" && password==="TALHA439"){
isAdmin=true; currentUser=null;
auth-page.classList.add('hidden'); dashboard.classList.remove('hidden');
document.querySelector(".sidebar").style.display="none";
showPage('admin-panel');
}else alert("Invalid Admin credentials");
}

function logout(){ location.reload(); }

function showPage(pageId){
['profile','teams','create-team','scoreboard','admin-panel'].forEach(id=>document.getElementById(id).classList.add('hidden'));
document.getElementById(pageId).classList.remove('hidden');
renderTeams(); renderScoreboard();
}

function updateProfile(){
if(!currentUser) return;
profile-name.innerText = currentUser.name;
profile-username.innerText = currentUser.username;
profile-team.innerText = currentUser.team || 'Not Assigned';
profile-ign.innerText = currentUser.ign;
}

function createTeam(){
const name = team-name.value;
const players = [player1.value,player2.value,player3.value,player4.value,player5.value,player6.value].filter(p=>p);
if(!name || players.length<4){ alert("Team Name + min 4 players required"); return; }
teams.push({name, players, score:0});
saveAll(); alert("Team Created"); renderTeams();
}

function renderTeams(){
const list = team-list; list.innerHTML="";
teams.forEach(t=>{
const d=document.createElement('div'); d.className='card';
d.innerText = t.name+" - "+t.players.join(', ')+" | Score: "+t.score;
list.appendChild(d);
});
}

function renderScoreboard(){
const box = score-list; box.innerHTML="";
[...teams].sort((a,b)=>b.score-a.score).forEach((t,i)=>{
const d=document.createElement('div'); d.innerText=(i+1)+". "+t.name+" - "+t.score; box.appendChild(d);
});
}

function updateTeamScore(){
const name = admin-team-name.value;
const score = parseInt(admin-team-score.value);
const t = teams.find(x=>x.name===name);
if(t){ t.score = score; saveAll(); alert("Score Updated"); renderScoreboard(); } 
else alert("Team not found");
}

function toggleRegistration(){ registrationOpen = !registrationOpen; saveAll(); updateRegStatus(); }
function updateRegStatus(){ reg-status.innerText = registrationOpen?"OPEN ✅":"CLOSED ❌"; }
window.onload=updateRegStatus;

</script>
</body>
</html>
