<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PF Esports System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white}
.card{background:#121a2a;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none}
button{background:#00f7ff;font-weight:bold;cursor:pointer}
.hidden{display:none}
.glow{text-align:center;text-shadow:0 0 10px #00f7ff}
.admin{border:2px solid red}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h2 class="glow">ESPORTS LOGIN</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Signup</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <h3>Welcome</h3>
    <p id="user"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Players</h3>
    <input id="pname" placeholder="Name">
    <input id="ping" placeholder="IGN">
    <button onclick="addPlayer()">Add Player</button>
    <div id="players"></div>
  </div>

</div>

<script>

// FIREBASE CONFIG (same as yours)
const firebaseConfig = {
  apiKey: "AIzaSyAowtYIS_HuN6MOYDC7cv_Rtb_jylm1A1Y",
  authDomain: "pef-esports-federation.firebaseapp.com",
  projectId: "pef-esports-federation",
  storageBucket: "pef-esports-federation.appspot.com",
  messagingSenderId: "990873596300",
  appId: "1:990873596300:web:97b6cea53b651e44d3e6a9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const authDiv = document.getElementById("auth");
const dash = document.getElementById("dashboard");

// ✅ FIXED LOGIN SYSTEM
document.getElementById("signupBtn").addEventListener("click", () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(() => alert("Signup Done"))
  .catch(e => alert(e.message));
});

document.getElementById("loginBtn").addEventListener("click", () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(() => alert("Login Success"))
  .catch(e => alert(e.message));
});

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.classList.add("hidden");
    dash.classList.remove("hidden");
    document.getElementById("user").innerText = user.email;
  } else {
    authDiv.classList.remove("hidden");
    dash.classList.add("hidden");
  }
});

function logout(){
  auth.signOut();
}

// PLAYER ADD
function addPlayer(){
  db.collection("players").add({
    name: pname.value,
    ign: ping.value
  });
}

// LOAD PLAYERS
db.collection("players").onSnapshot(s=>{
  players.innerHTML="";
  s.forEach(d=>{
    let p=d.data();
    players.innerHTML += <p>${p.name} - ${p.ign}</p>;
  });
});

</script>

</body>
</html>
