<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Esports Federation System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:10px;
background:#1c1f2e;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

section{
display:none;
padding:20px;
}

.card{
background:#151a2b;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
width:90%;
border-radius:6px;
border:none;
}

.hidden{display:none;}

h2{color:#00d4ff;}
</style>
</head>

<body>

<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('signup')">Signup</button>
<button onclick="show('dashboard')" id="dashBtn" class="hidden">Dashboard</button>
<button onclick="show('admin')" id="adminBtn" class="hidden">Admin</button>
</nav>

<!-- LOGIN -->
<section id="login" style="display:block;">
<h2>🔐 Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</section>

<!-- SIGNUP -->
<section id="signup">
<h2>🆕 Signup</h2>
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password">
<button onclick="signup()">Create Account</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>🎮 Esports Dashboard</h2>

<div class="card">
<h3>🏆 Team Registration</h3>
<input id="teamName" placeholder="Team Name">
<input id="leaderName" placeholder="Leader Name">
<button onclick="addTeam()">Register Team</button>
</div>

<div class="card">
<h3>📊 Teams</h3>
<div id="teams"></div>
</div>

<div class="card">
<h3>📅 Tournaments</h3>
<p>🔥 PUBG Scrims Season</p>
<p>🔥 Weekly Clash Cup</p>
<p>🔥 Pro League Qualifiers</p>
</div>

<div class="card">
<h3>📢 Announcements</h3>
<p>New season starting soon 🚀</p>
</div>

</section>

<!-- ADMIN -->
<section id="admin">
<h2>👑 Admin Panel</h2>

<div class="card">
<h3>All Registered Teams</h3>
<div id="adminTeams"></div>
</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAowtYIS_HuN6MOYDC7cv_Rtb_jylm1A1Y",
  authDomain: "pef-esports-federation.firebaseapp.com",
  projectId: "pef-esports-federation",
  storageBucket: "pef-esports-federation.firebasestorage.app",
  messagingSenderId: "990873596300",
  appId: "1:990873596300:web:97b6cea53b651e44d3e6a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let loggedIn = false;

/* NAV CONTROL */
window.show = function(page){

if(!loggedIn && (page=="dashboard" || page=="admin")){
alert("Login required!");
return;
}

document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(page).style.display="block";

if(page=="dashboard") loadTeams();
if(page=="admin") loadAdmin();
}

/* SIGNUP */
window.signup = function(){
createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value)
.then(()=>alert("Account Created"))
.catch(e=>alert(e.message));
}

/* LOGIN */
window.login = function(){
signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value)
.then(()=>{
loggedIn=true;
dashBtn.classList.remove("hidden");
adminBtn.classList.remove("hidden");
alert("Login Success");
show("dashboard");
})
.catch(e=>alert(e.message));
}

/* ADD TEAM */
window.addTeam = async function(){
await addDoc(collection(db,"teams"),{
team: teamName.value,
leader: leaderName.value,
time: new Date().toLocaleString()
});
loadTeams();
}

/* LOAD USER TEAMS */
window.loadTeams = async function(){
let data = await getDocs(collection(db,"teams"));
let html="";
data.forEach(d=>{
html+=`
<div class="card">
🏆 ${d.data().team}<br>
👤 ${d.data().leader}
</div>`;
});
teams.innerHTML=html;
}

/* ADMIN PANEL */
window.loadAdmin = async function(){
let data = await getDocs(collection(db,"teams"));
let html="";
data.forEach(d=>{
html+=`
<div class="card">
🔥 ${d.data().team}<br>
👤 ${d.data().leader}
</div>`;
});
adminTeams.innerHTML=html;
}

</script>

</body>
</html>
